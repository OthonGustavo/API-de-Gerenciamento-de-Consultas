<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSecure Enterprise - Marcações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const PROCEDIMENTOS = [
          { id: 1, nome: "Primeira Consulta", duracao: 60, preco: 350.00 },
          { id: 2, nome: "Sessão de Terapia", duracao: 45, preco: 250.00 }
        ];
        const CONSULTAS_MOCK = [
          { id: 101, paciente: "Maria Silva", procedimento: "Primeira Consulta", data: "2026-02-27", hora: "09:00", status: "CONFIRMADA" },
          { id: 102, paciente: "João Pedro", procedimento: "Sessão de Terapia", data: "2026-02-27", hora: "10:30", status: "AGENDADA" }
        ];
        function AgendamentoApp() {
            const [usuarioLogado, setUsuarioLogado] = useState(null);
            if (!usuarioLogado) return <TelaLogin onLogin={setUsuarioLogado} />;
            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-10">
                        <div className="flex items-center gap-3 text-indigo-700">
                            <i className="fas fa-shield-alt text-2xl"></i><h1 className="text-xl font-bold tracking-tight">HealthSecure<span className="text-slate-400 font-normal text-sm ml-2">Enterprise</span></h1>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3 border-l border-slate-200 pl-6">
                                <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold border-2 border-indigo-200">
                                    {usuarioLogado === 'PROFISSIONAL' ? 'DR' : 'MS'}
                                </div>
                                <div className="hidden md:block">
                                    <p className="text-sm font-semibold">{usuarioLogado === 'PROFISSIONAL' ? 'Dr. Carlos Mendes' : 'Maria Silva'}</p>
                                    <p className="text-xs text-slate-500">{usuarioLogado === 'PROFISSIONAL' ? 'Médico Psiquiatra' : 'Paciente'}</p>
                                </div>
                                <button onClick={() => setUsuarioLogado(null)} className="ml-4 text-slate-400 hover:text-red-500"><i className="fas fa-sign-out-alt text-xl"></i></button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8">
                        {usuarioLogado === 'PROFISSIONAL' ? <DashboardProfissional /> : <AreaPaciente />}
                    </main>
                </div>
            );
        }
        function TelaLogin({ onLogin }) {
            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
                        <div className="flex justify-center mb-6 text-indigo-600"><i className="fas fa-shield-halved text-6xl"></i></div>
                        <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">Acesso Seguro</h2>
                        <p className="text-center text-slate-500 text-sm mb-8">Autenticação com encriptação ponta a ponta (LGPD)</p>
                        <div className="space-y-4">
                            <button onClick={() => onLogin('PACIENTE')} className="w-full flex items-center justify-center gap-3 bg-indigo-50 text-indigo-700 py-3 rounded-lg font-semibold hover:bg-indigo-100 border border-indigo-200"><i className="fas fa-user"></i> Entrar como Paciente</button>
                            <button onClick={() => onLogin('PROFISSIONAL')} className="w-full flex items-center justify-center gap-3 bg-slate-800 text-white py-3 rounded-lg font-semibold hover:bg-slate-900 shadow-md"><i className="fas fa-user-md"></i> Entrar como Profissional</button>
                        </div>
                    </div>
                </div>
            );
        }
        function AreaPaciente() {
            const [proc, setProc] = useState(null); const [data, setData] = useState(''); const [hora, setHora] = useState('');
            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-6">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><i className="fas fa-calendar-plus text-indigo-600"></i> Marcar Nova Consulta</h2>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-8">
                            <div>
                                <h3 className="text-lg font-semibold mb-4 text-slate-700">1. Escolha o Procedimento</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {PROCEDIMENTOS.map(p => (
                                        <div key={p.id} onClick={() => setProc(p.id)} className={`cursor-pointer border-2 rounded-xl p-4 transition-all ${proc === p.id ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200'}`}>
                                            <p className="font-bold">{p.nome}</p>
                                            <div className="flex justify-between items-center mt-2 text-sm text-slate-500"><span><i className="far fa-clock"></i> {p.duracao} min</span><span className="font-semibold text-emerald-600">R$ {p.preco.toFixed(2)}</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {proc && (
                                <div>
                                    <h3 className="text-lg font-semibold mb-4 text-slate-700">2. Escolha a Data e Hora</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div><input type="date" className="w-full border border-slate-300 rounded-lg p-3" value={data} onChange={(e) => setData(e.target.value)} /></div>
                                        <div><div className="flex flex-wrap gap-2">{data ? ["09:00", "10:30", "14:00"].map(h => <button key={h} onClick={() => setHora(h)} className={`px-4 py-2 rounded-lg font-medium text-sm border ${hora === h ? 'bg-indigo-600 text-white' : 'bg-white'}`}>{h}</button>) : <p className="text-sm text-slate-400">Selecione uma data primeiro.</p>}</div></div>
                                    </div>
                                </div>
                            )}
                            <div className="pt-4 border-t border-slate-100">
                                <button disabled={!proc || !data || !hora} className="w-full bg-emerald-500 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl"><i className="fas fa-check-circle mr-2"></i> Confirmar Marcação Segura</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        function DashboardProfissional() {
            return (
                <div className="space-y-8">
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200 font-bold text-slate-700">Agenda do Dia</div>
                        <table className="w-full text-left">
                            <tbody className="divide-y divide-slate-100">
                                {CONSULTAS_MOCK.map((c, i) => (
                                    <tr key={i} className="hover:bg-slate-50">
                                        <td className="p-4 font-semibold text-slate-700"><i className="far fa-clock text-slate-400 mr-2"></i>{c.hora}</td>
                                        <td className="p-4 font-medium">{c.paciente}</td>
                                        <td className="p-4 text-slate-600 text-sm">{c.procedimento}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AgendamentoApp />);
    </script>
</body>
</html>
