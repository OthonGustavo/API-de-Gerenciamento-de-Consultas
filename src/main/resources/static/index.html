<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioSecure Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // === INTEGRAÇÃO GEMINI API ===
        const apiKey = ""; 

        const fetchWithRetry = async (url, options, retries = 5) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, 1000 * Math.pow(2, i)));
                }
            }
        };

        const generateGeminiContent = async (prompt, systemInstruction) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                ...(systemInstruction && { systemInstruction: { parts: [{ text: systemInstruction }] } })
            };
            try {
                const data = await fetchWithRetry(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao gerar resposta. Verifique a chave da API.";
            } catch (e) {
                return "Desculpe, não foi possível conectar à IA no momento.";
            }
        };

        // === DADOS DA CLÍNICA DE FISIOTERAPIA (COM REGRAS DE NEGÓCIO E PLANOS) ===
        const PROCEDIMENTOS = [
          { 
              id: 1, nome: "Fisioterapia Traumato-Ortopédica", duracao: 60, capacidade: 1, tipo: "INDIVIDUAL", corBg: "bg-blue-100", corText: "text-blue-700", corBorder: "border-blue-200",
              planos: [
                  { id: 'f1', nome: 'Sessão Avulsa', preco: 120.00, sessoes: 1 },
                  { id: 'f2', nome: 'Pacote 10 Sessões', preco: 1000.00, sessoes: 10 }
              ]
          },
          { 
              id: 2, nome: "Liberação Miofascial", duracao: 60, capacidade: 1, tipo: "INDIVIDUAL", corBg: "bg-emerald-100", corText: "text-emerald-700", corBorder: "border-emerald-200",
              planos: [
                  { id: 'l1', nome: 'Sessão Avulsa', preco: 150.00, sessoes: 1 },
                  { id: 'l2', nome: 'Pacote 4 Sessões', preco: 400.00, sessoes: 4 }
              ]
          },
          { 
              id: 3, nome: "Sessão de Pilates Clínico", duracao: 60, capacidade: 6, tipo: "GRUPO", corBg: "bg-rose-100", corText: "text-rose-700", corBorder: "border-rose-200",
              planos: [
                  { id: 'p1', nome: 'Particular (Avulsa)', preco: 100.00, sessoes: 1 },
                  { id: 'p2', nome: 'Gympass (Silver)', preco: 13.33, sessoes: 1, parceiro: true },
                  { id: 'p3', nome: 'Totalpass (T2)', preco: 12.33, sessoes: 1, parceiro: true },
                  { id: 'p4', nome: '1 Mês (2x Semana)', preco: 200.00, sessoes: 8 },
                  { id: 'p5', nome: '1 Mês (3x Semana)', preco: 250.00, sessoes: 12 },
                  { id: 'p6', nome: '6 Meses (2x Semana)', preco: 180.00, sessoes: 48 },
                  { id: 'p7', nome: '6 Meses (3x Semana)', preco: 220.00, sessoes: 72 },
                  { id: 'p8', nome: '12 Meses (2x Semana)', preco: 150.00, sessoes: 96 },
                  { id: 'p9', nome: '12 Meses (3x Semana)', preco: 200.00, sessoes: 144 }
              ]
          }
        ];

        function AgendamentoApp() {
            const [usuarioLogado, setUsuarioLogado] = useState(null);
            
            // Contas de teste iniciais (4 Pacientes e 1 Profissional)
            const [usuariosRegistados, setUsuariosRegistados] = useState([
                { email: 'fisioterapeuta@clinica.com', senha: '123', nome: 'Dr. Carlos Físio', perfil: 'PROFISSIONAL', creditos: {} },
                { email: 'maria@email.com', senha: '123', nome: 'Maria Silva', telefone: '5575988035442', perfil: 'PACIENTE', creditos: { 3: { saldo: 5, plano: '1 Mês (2x Semana)' } } },
                { email: 'joao@email.com', senha: '123', nome: 'João Pedro', telefone: '5511999999999', perfil: 'PACIENTE', creditos: { 1: { saldo: 10, plano: 'Pacote 10 Sessões' } } },
                { email: 'ana@email.com', senha: '123', nome: 'Ana Costa', telefone: '5521888888888', perfil: 'PACIENTE', creditos: {} },
                { email: 'lucas@email.com', senha: '123', nome: 'Lucas Santos', telefone: '5571777777777', perfil: 'PACIENTE', creditos: { 3: { saldo: 1, plano: 'Gympass (Silver)' } } }
            ]);

            const [consultas, setConsultas] = useState([
                { id: 101, paciente: "Maria Silva", pacienteEmail: "maria@email.com", telefone: "5575988035442", procedimentoId: 1, data: "2026-03-05", hora: "09:00", status: "CONFIRMADA" },
                { id: 102, paciente: "João Pedro", pacienteEmail: "joao@email.com", telefone: "5511999999999", procedimentoId: 3, data: "2026-03-05", hora: "14:00", status: "AGENDADA" },
                { id: 103, paciente: "Ana Costa", pacienteEmail: "ana@email.com", telefone: "5521888888888", procedimentoId: 3, data: "2026-03-06", hora: "08:00", status: "CONFIRMADA" }
            ]);

            const adicionarConsulta = (novasConsultas) => {
                const consultasComId = novasConsultas.map((c, index) => ({ ...c, id: Date.now() + index }));
                setConsultas([...consultas, ...consultasComId]);
            };

            const cancelarConsulta = (id) => {
                setConsultas(consultas.filter(c => c.id !== id));
            };

            const comprarCreditos = (procId, quantidade, planoNome) => {
                const novosCreditos = { ...(usuarioLogado.creditos || {}) };
                if (!novosCreditos[procId]) novosCreditos[procId] = { saldo: 0, plano: '' };
                novosCreditos[procId].saldo += quantidade;
                novosCreditos[procId].plano = planoNome;
                
                const userAtualizado = { ...usuarioLogado, creditos: novosCreditos };
                setUsuarioLogado(userAtualizado);
                setUsuariosRegistados(prev => prev.map(u => u.email === userAtualizado.email ? userAtualizado : u));
            };

            const usarCreditos = (procId, quantidade) => {
                const novosCreditos = { ...usuarioLogado.creditos };
                if (novosCreditos[procId]) {
                    novosCreditos[procId].saldo -= quantidade;
                    if (novosCreditos[procId].saldo < 0) novosCreditos[procId].saldo = 0;
                }
                const userAtualizado = { ...usuarioLogado, creditos: novosCreditos };
                setUsuarioLogado(userAtualizado);
                setUsuariosRegistados(prev => prev.map(u => u.email === userAtualizado.email ? userAtualizado : u));
            };

            const handleLoginAttempt = (credenciais, isRegistering) => {
                if (isRegistering) {
                    const existe = usuariosRegistados.find(u => u.email === credenciais.email);
                    if (existe) return alert("E-mail já registado!");
                    const novo = { ...credenciais, creditos: {} };
                    setUsuariosRegistados([...usuariosRegistados, novo]);
                    setUsuarioLogado(novo);
                } else {
                    const utilizador = usuariosRegistados.find(u => u.email === credenciais.email && u.senha === credenciais.senha);
                    if (utilizador && utilizador.perfil === credenciais.perfil) {
                        setUsuarioLogado(utilizador);
                    } else {
                        alert("Credenciais inválidas ou perfil incorreto.");
                    }
                }
            };

            if (!usuarioLogado) return <TelaLogin onLogin={handleLoginAttempt} />;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-10">
                        <div className="flex items-center gap-3 text-indigo-700">
                            <i className="fas fa-running text-2xl"></i>
                            <h1 className="text-xl font-bold tracking-tight">Physio<span className="font-light text-slate-600">Secure</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden md:block">
                                <p className="text-sm font-bold text-slate-800">{usuarioLogado.nome}</p>
                                <p className="text-xs text-slate-500">{usuarioLogado.perfil === 'PROFISSIONAL' ? 'Fisioterapeuta' : 'Paciente'}</p>
                            </div>
                            <button onClick={() => setUsuarioLogado(null)} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-red-100 hover:text-red-600 transition-colors">
                                <i className="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
                        {usuarioLogado.perfil === 'PROFISSIONAL' 
                            ? <DashboardProfissional consultas={consultas} usuariosRegistados={usuariosRegistados} /> 
                            : <AreaPaciente usuario={usuarioLogado} consultas={consultas} adicionarConsulta={adicionarConsulta} cancelarConsulta={cancelarConsulta} comprarCreditos={comprarCreditos} usarCreditos={usarCreditos} />
                        }
                    </main>
                </div>
            );
        }

        function TelaLogin({ onLogin }) {
            const [isReg, setIsReg] = useState(false);
            const [perfil, setPerfil] = useState('PACIENTE');
            const [form, setForm] = useState({ nome: '', email: '', senha: '', telefone: '' });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.email || !form.senha || (isReg && !form.nome)) return alert("Preencha os campos obrigatórios.");
                onLogin({ ...form, perfil }, isReg);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">
                        <div className="flex justify-center mb-4 text-indigo-600"><i className="fas fa-running text-5xl"></i></div>
                        <h2 className="text-2xl font-bold text-center text-slate-800 mb-6">{isReg ? 'Criar Conta' : 'Acesso à Clínica'}</h2>
                        
                        <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                            <button type="button" onClick={() => setPerfil('PACIENTE')} className={`flex-1 py-2 text-sm font-semibold rounded-md ${perfil === 'PACIENTE' ? 'bg-white shadow text-indigo-700' : 'text-slate-500'}`}>Paciente</button>
                            <button type="button" onClick={() => setPerfil('PROFISSIONAL')} className={`flex-1 py-2 text-sm font-semibold rounded-md ${perfil === 'PROFISSIONAL' ? 'bg-slate-800 shadow text-white' : 'text-slate-500'}`}>Profissional</button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isReg && (
                                <>
                                    <input type="text" placeholder="Nome Completo" onChange={e => setForm({...form, nome: e.target.value})} className="w-full border p-3 rounded-lg text-sm" />
                                    <input type="tel" placeholder="Telemóvel/WhatsApp (Ex: 55759...)" onChange={e => setForm({...form, telefone: e.target.value})} className="w-full border p-3 rounded-lg text-sm" />
                                </>
                            )}
                            <input type="email" placeholder="E-mail" onChange={e => setForm({...form, email: e.target.value})} className="w-full border p-3 rounded-lg text-sm" />
                            <input type="password" placeholder="Senha" onChange={e => setForm({...form, senha: e.target.value})} className="w-full border p-3 rounded-lg text-sm" />
                            <button type="submit" className="w-full py-3 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md">
                                {isReg ? 'Registar' : 'Entrar'}
                            </button>
                        </form>
                        <p className="mt-4 text-center text-sm text-slate-600">
                            <button onClick={() => setIsReg(!isReg)} className="text-indigo-600 font-bold hover:underline">{isReg ? 'Já tenho conta' : 'Criar nova conta'}</button>
                        </p>
                        
                        <div className="mt-6 p-4 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-500">
                            <p className="font-bold mb-1">Contas de Teste (Senha: 123):</p>
                            <ul className="list-disc pl-4 space-y-1">
                                <li>fisioterapeuta@clinica.com (Profissional)</li>
                                <li>maria@email.com (Paciente c/ Pilates)</li>
                                <li>joao@email.com (Paciente c/ Fisio)</li>
                                <li>ana@email.com (Paciente sem plano)</li>
                                <li>lucas@email.com (Paciente Gympass)</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        function AreaPaciente({ usuario, consultas, adicionarConsulta, cancelarConsulta, comprarCreditos, usarCreditos }) {
            const [procId, setProcId] = useState(null);
            const [planoId, setPlanoId] = useState(null);
            const [tokenParceiro, setTokenParceiro] = useState('');
            const [data, setData] = useState('');
            const [hora, setHora] = useState('');
            const [sessoesSelecionadas, setSessoesSelecionadas] = useState([]); 
            
            const horarios = ["07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00"];
            const hoje = new Date().toISOString().split('T')[0];
            const minhasConsultas = consultas.filter(c => c.pacienteEmail === usuario.email);

            const creditosAtuais = usuario.creditos?.[procId] || { saldo: 0, plano: '' };
            const temCreditos = creditosAtuais.saldo > 0;

            useEffect(() => {
                setPlanoId(null);
                setTokenParceiro('');
                setSessoesSelecionadas([]);
            }, [procId]);

            const procSelecionado = PROCEDIMENTOS.find(p => p.id === procId);
            const planoSelecionado = procSelecionado?.planos.find(pl => pl.id === planoId);

            const handleComprarPlano = () => {
                if (planoSelecionado.parceiro && !tokenParceiro.trim()) {
                    alert(`Por favor, insira o Token de Validação do ${planoSelecionado.nome.split(' ')[0]} para concluir.`);
                    return;
                }
                comprarCreditos(procId, planoSelecionado.sessoes, planoSelecionado.nome);
                setPlanoId(null);
                setTokenParceiro('');
                alert(`Plano adquirido com sucesso! Ganhou ${planoSelecionado.sessoes} crédito(s). Já pode agendar abaixo.`);
            };

            const adicionarSessaoFlexivel = () => {
                if (!data || !hora) return;
                
                if (sessoesSelecionadas.length >= creditosAtuais.saldo) {
                    alert(`Atenção: Atingiu o limite do seu saldo ativo (${creditosAtuais.saldo} créditos).`);
                    return;
                }

                if (sessoesSelecionadas.some(s => s.data === data && s.hora === hora)) {
                    alert("Já adicionou este horário ao seu carrinho.");
                    return;
                }

                const consultasNoSlot = consultas.filter(c => c.data === data && c.hora === hora);
                const slotsNoCarrinho = sessoesSelecionadas.filter(s => s.data === data && s.hora === hora).length;
                const ocupacaoTotal = consultasNoSlot.length + slotsNoCarrinho;
                
                let isOcupado = false;
                if (ocupacaoTotal > 0) {
                    const procExistente = consultasNoSlot.length > 0 
                        ? PROCEDIMENTOS.find(p => p.id === consultasNoSlot[0].procedimentoId)
                        : procSelecionado;

                    if (procExistente.tipo === 'INDIVIDUAL' || procSelecionado.tipo === 'INDIVIDUAL') {
                        isOcupado = true;
                    } else if (ocupacaoTotal >= procSelecionado.capacidade) {
                        isOcupado = true;
                    }
                }

                if (isOcupado) {
                    alert("O horário selecionado não tem capacidade disponível.");
                    return;
                }

                setSessoesSelecionadas([...sessoesSelecionadas, { data, hora }]);
                setHora(''); 
            };

            const removerSessaoFlexivel = (index) => {
                const novaLista = [...sessoesSelecionadas];
                novaLista.splice(index, 1);
                setSessoesSelecionadas(novaLista);
            };

            const handleConfirmarAgendamentos = () => {
                let agendamentos = sessoesSelecionadas.map(sessao => ({
                    paciente: usuario.nome,
                    pacienteEmail: usuario.email,
                    telefone: usuario.telefone || '',
                    procedimentoId: procSelecionado.id,
                    planoNome: creditosAtuais.plano, 
                    data: sessao.data,
                    hora: sessao.hora,
                    status: 'AGENDADA'
                }));

                if (agendamentos.length > 0) {
                    adicionarConsulta(agendamentos);
                    usarCreditos(procId, agendamentos.length); 
                    alert(`${agendamentos.length} sessão(ões) registada(s) com sucesso na sua agenda!`);
                    setProcId(null); setData(''); setHora(''); setSessoesSelecionadas([]);
                }
            };

            const [sintomas, setSintomas] = useState('');
            const [triagemResultado, setTriagemResultado] = useState('');
            const [isLoadingTriagem, setIsLoadingTriagem] = useState(false);

            const handleTriagem = async () => {
                if (!sintomas.trim()) return;
                setIsLoadingTriagem(true);
                const instrucao = "És um assistente virtual empático de uma clínica de fisioterapia. Analisa os sintomas e sugere qual a especialidade/procedimento mais adequado. Seja breve.";
                const resposta = await generateGeminiContent(`Sintomas do paciente: ${sintomas}`, instrucao);
                setTriagemResultado(resposta);
                setIsLoadingTriagem(false);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-6">
                        <div className="bg-indigo-50 rounded-2xl shadow-sm border border-indigo-100 p-6">
                            <h3 className="text-lg font-bold text-indigo-800 mb-2 flex items-center gap-2">
                                ✨ Triagem Inteligente (IA)
                            </h3>
                            <p className="text-sm text-indigo-600 mb-4">Descreva o que está a sentir para receber orientação.</p>
                            <textarea 
                                value={sintomas}
                                onChange={(e) => setSintomas(e.target.value)}
                                placeholder="Ex: Sinto muita dor nas costas ao fundo..."
                                className="w-full border border-indigo-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-400 outline-none resize-none"
                                rows="3"
                            ></textarea>
                            <button 
                                onClick={handleTriagem} 
                                disabled={isLoadingTriagem || !sintomas.trim()}
                                className="mt-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors"
                            >
                                {isLoadingTriagem ? "A analisar sintomas..." : "✨ Analisar Sintomas"}
                            </button>
                            
                            {triagemResultado && (
                                <div className="mt-4 bg-white p-4 rounded-lg border border-indigo-100 text-sm text-slate-700 whitespace-pre-wrap">
                                    <strong className="text-indigo-700">Orientação da IA:</strong><br/>
                                    {triagemResultado}
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
                            <h3 className="text-lg font-bold text-slate-800 border-b pb-2">Central de Agendamento</h3>
                            
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-3">1. Selecione o Tratamento</label>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    {PROCEDIMENTOS.map(p => {
                                        const saldoProcedimento = usuario.creditos?.[p.id]?.saldo || 0;
                                        return (
                                        <div key={p.id} onClick={() => setProcId(p.id)} className={`relative cursor-pointer border-2 rounded-xl p-4 transition-all ${procId === p.id ? `${p.corBorder} ${p.corBg}` : 'border-slate-200 hover:border-slate-300'}`}>
                                            <p className={`font-bold text-sm ${procId === p.id ? p.corText : 'text-slate-700'}`}>{p.nome}</p>
                                            <div className="flex justify-between items-center mt-2 text-xs text-slate-500">
                                                <span><i className="far fa-clock"></i> {p.duracao}m</span>
                                            </div>
                                            {saldoProcedimento > 0 && (
                                                <span className="absolute -top-2 -right-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">
                                                    {saldoProcedimento} créditos
                                                </span>
                                            )}
                                        </div>
                                    )})}
                                </div>
                            </div>

                            {procSelecionado && !temCreditos && (
                                <div className="animate-fade-in bg-slate-50 p-5 rounded-xl border border-slate-100">
                                    <label className="block text-sm font-semibold text-slate-700 mb-3">2. Comprar Pacote / Sessão ({procSelecionado.nome})</label>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                        {procSelecionado.planos.map(plano => (
                                            <div key={plano.id} onClick={() => setPlanoId(plano.id)} className={`cursor-pointer border rounded-xl p-3 transition-all ${planoId === plano.id ? 'border-indigo-600 bg-indigo-50 shadow-sm' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                                                <p className={`font-bold text-sm ${planoId === plano.id ? 'text-indigo-700' : 'text-slate-700'}`}>
                                                    {plano.parceiro && <i className="fas fa-ticket-alt text-amber-500 mr-1"></i>}
                                                    {plano.nome}
                                                </p>
                                                <div className="flex justify-between items-center mt-2 text-xs">
                                                    <span className="text-slate-500">{plano.sessoes} Crédito(s)</span>
                                                    <span className="font-semibold text-emerald-600">R$ {plano.preco.toFixed(2)}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {planoSelecionado?.parceiro && (
                                        <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-lg animate-fade-in">
                                            <label className="text-xs font-bold text-amber-800 block mb-1">Token de Validação ({planoSelecionado.nome.split(' ')[0]})</label>
                                            <input type="text" value={tokenParceiro} onChange={e => setTokenParceiro(e.target.value)} placeholder="Ex: A1B2C3D4" className="w-full border border-amber-300 rounded p-2 text-sm outline-none focus:ring-2 focus:ring-amber-500 bg-white" />
                                        </div>
                                    )}

                                    <div className="mt-5">
                                        <button onClick={handleComprarPlano} disabled={!planoId} className="w-full bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 text-white font-bold py-3 rounded-lg shadow-sm transition-colors">
                                            Confirmar e Obter Créditos
                                        </button>
                                    </div>
                                </div>
                            )}
                            
                            {procSelecionado && temCreditos && (
                                <div className="animate-fade-in bg-slate-50 p-5 rounded-xl border border-slate-100">
                                    <div className="bg-indigo-100 border border-indigo-200 rounded-lg p-4 mb-6 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] uppercase font-bold text-indigo-500 mb-1">Sua Carteira</p>
                                            <p className="font-bold text-indigo-800 text-lg flex items-center gap-2">
                                                <i className="fas fa-wallet text-indigo-600"></i> {creditosAtuais.saldo} créditos restantes
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <span className="bg-white text-indigo-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">{creditosAtuais.plano}</span>
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-center mb-3">
                                        <label className="block text-sm font-semibold text-slate-700">3. Construa a sua agenda</label>
                                        <span className="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">
                                            Carrinho: {sessoesSelecionadas.length} / {creditosAtuais.saldo}
                                        </span>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className={sessoesSelecionadas.length >= creditosAtuais.saldo ? "opacity-50 pointer-events-none" : ""}>
                                            <input type="date" min={hoje} className="w-full border border-slate-300 rounded-lg p-3 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none mb-4" value={data} onChange={(e) => { setData(e.target.value); setHora(''); }} />
                                            
                                            <div className="flex flex-wrap gap-2">
                                                {data ? horarios.map(h => {
                                                    const consultasNoHorario = consultas.filter(c => c.data === data && c.hora === h);
                                                    const slotsNoCarrinho = sessoesSelecionadas.filter(s => s.data === data && s.hora === h).length;
                                                    const ocupacaoAtual = consultasNoHorario.length + slotsNoCarrinho;
                                                    
                                                    let isOcupado = false;
                                                    let tipoOcupacao = null; 
                                                    
                                                    if (ocupacaoAtual > 0) {
                                                        const procNoHorario = consultasNoHorario.length > 0 ? PROCEDIMENTOS.find(p => p.id === consultasNoHorario[0].procedimentoId) : procSelecionado;
                                                        
                                                        if (procNoHorario.tipo === "INDIVIDUAL" || procSelecionado.tipo === "INDIVIDUAL") {
                                                            isOcupado = true;
                                                            tipoOcupacao = 'CHEIO';
                                                        } else {
                                                            if (ocupacaoAtual >= procSelecionado.capacidade) {
                                                                isOcupado = true;
                                                                tipoOcupacao = 'CHEIO';
                                                            } else {
                                                                tipoOcupacao = 'ABERTA';
                                                            }
                                                        }
                                                    }

                                                    return (
                                                        <button 
                                                            key={h} 
                                                            onClick={() => setHora(h)} 
                                                            disabled={isOcupado} 
                                                            className={`relative px-4 py-2 rounded-lg font-medium text-sm border transition-colors ${
                                                                isOcupado 
                                                                    ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed line-through' 
                                                                    : (hora === h 
                                                                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' 
                                                                        : tipoOcupacao === 'ABERTA'
                                                                            ? 'bg-amber-50 text-amber-700 border-amber-300 hover:bg-amber-100' 
                                                                            : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50')
                                                            }`}
                                                        >
                                                            {h}
                                                            {!isOcupado && tipoOcupacao === 'ABERTA' && (
                                                                <span className="absolute -top-2 -right-2 bg-amber-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">
                                                                    {ocupacaoAtual}/6
                                                                </span>
                                                            )}
                                                        </button>
                                                    );
                                                }) : <p className="text-sm text-slate-400">Selecione uma data para ver os horários.</p>}
                                            </div>

                                            <button 
                                                onClick={adicionarSessaoFlexivel}
                                                disabled={!data || !hora}
                                                className="mt-6 w-full bg-indigo-100 hover:bg-indigo-200 disabled:bg-slate-100 disabled:text-slate-400 disabled:border-slate-200 text-indigo-700 font-bold py-3 rounded-lg text-sm transition-colors border border-indigo-200 flex justify-center items-center gap-2"
                                            >
                                                Adicionar ao Carrinho <i className="fas fa-plus"></i>
                                            </button>
                                        </div>
                                        
                                        <div className="bg-white border border-slate-200 rounded-xl p-4 h-full flex flex-col shadow-sm">
                                            <h4 className="text-xs font-bold text-slate-500 uppercase mb-3"><i className="fas fa-shopping-cart mr-1"></i> Carrinho ({sessoesSelecionadas.length})</h4>
                                            <div className="flex-1 overflow-y-auto pr-1 space-y-2 max-h-64">
                                                {sessoesSelecionadas.length === 0 ? (
                                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 italic text-sm text-center py-6">
                                                        <p>Adicione sessões ao lado.</p>
                                                    </div>
                                                ) : (
                                                    sessoesSelecionadas.map((s, idx) => (
                                                        <div key={idx} className="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-100 text-sm animate-fade-in">
                                                            <div className="flex items-center gap-3">
                                                                <span className="bg-indigo-100 text-indigo-700 font-bold px-2 py-1 rounded text-xs">{idx + 1}</span>
                                                                <span className="font-medium text-slate-700">
                                                                    {s.data.split('-').reverse().join('/')} <span className="mx-1 text-slate-300">|</span> <span className="text-indigo-600"><i className="far fa-clock"></i> {s.hora}</span>
                                                                </span>
                                                            </div>
                                                            <button onClick={() => removerSessaoFlexivel(idx)} className="text-red-400 hover:text-red-600 bg-red-50 px-2 py-1.5 rounded transition-colors" title="Remover">
                                                                <i className="fas fa-trash-alt"></i>
                                                            </button>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            {sessoesSelecionadas.length > 0 && (
                                                <button onClick={handleConfirmarAgendamentos} className="mt-4 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-sm transition-colors text-sm">
                                                    Confirmar {sessoesSelecionadas.length} Marcação(ões)
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h2 className="text-xl font-bold text-slate-800">Próximas Sessões</h2>
                        {minhasConsultas.length === 0 ? (
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 text-center text-slate-500 text-sm">Sem marcações ativas.</div>
                        ) : (
                            minhasConsultas.sort((a,b) => a.data.localeCompare(b.data)).map(c => {
                                const proc = PROCEDIMENTOS.find(p => p.id === c.procedimentoId) || PROCEDIMENTOS[0];
                                return (
                                <div key={c.id} className={`bg-white rounded-xl shadow-sm border border-slate-200 p-4 relative overflow-hidden border-l-4 ${proc.corBorder.replace('border-', 'border-l-')}`}>
                                    <p className="font-bold text-slate-800 text-sm">{proc.nome}</p>
                                    <div className="flex justify-between items-center mt-2">
                                        <div className="text-sm text-slate-500 font-medium">
                                            <i className="far fa-calendar-alt text-indigo-400 mr-1"></i> {c.data.split('-').reverse().join('/')} <br/>
                                            <i className="far fa-clock text-indigo-400 mr-1 mt-1"></i> {c.hora}
                                        </div>
                                        <button onClick={() => cancelarConsulta(c.id)} className="text-xs text-red-500 hover:underline bg-red-50 p-2 rounded">Cancelar</button>
                                    </div>
                                </div>
                            )})
                        )}
                    </div>
                </div>
            );
        }

        function DashboardProfissional({ consultas, usuariosRegistados }) {
            const [abaAtiva, setAbaAtiva] = useState('AGENDA'); 
            
            return (
                <div className="space-y-6">
                    <div className="flex space-x-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                        {[
                            { id: 'AGENDA', icone: 'fa-calendar-alt', texto: 'Gestão de Agenda' },
                            { id: 'PRONTUARIO', icone: 'fa-file-medical', texto: 'Prontuário & Avaliação' },
                            { id: 'FINANCEIRO', icone: 'fa-chart-line', texto: 'Controlo Financeiro' }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setAbaAtiva(tab.id)} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${abaAtiva === tab.id ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <i className={`fas ${tab.icone}`}></i> {tab.texto}
                            </button>
                        ))}
                    </div>

                    {abaAtiva === 'AGENDA' && <TabAgenda consultas={consultas} />}
                    {abaAtiva === 'PRONTUARIO' && <TabProntuario />}
                    {abaAtiva === 'FINANCEIRO' && <TabFinanceiro consultas={consultas} usuarios={usuariosRegistados} />}
                </div>
            );
        }

        function TabAgenda({ consultas }) {
            const enviarWhatsApp = (telefone, paciente, data, hora) => {
                if(!telefone) return alert("Paciente sem telemóvel registado.");
                
                let numeroFormatado = String(telefone).replace(/\D/g, '');
                if (numeroFormatado.length === 10 || numeroFormatado.length === 11) {
                    numeroFormatado = '55' + numeroFormatado;
                }

                const msg = `Olá ${paciente}, somos da PhysioSecure. Lembramos da sua sessão de Fisioterapia amanhã, dia ${data.split('-').reverse().join('/')} às ${hora}. Confirma a presença?`;
                window.open(`https://wa.me/${numeroFormatado}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const agendamentosAgrupados = consultas.reduce((acc, c) => {
                if (!acc[c.data]) acc[c.data] = [];
                acc[c.data].push(c);
                return acc;
            }, {});
            
            const datasOrdenadas = Object.keys(agendamentosAgrupados).sort();

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <h3 className="font-bold text-slate-800 text-lg"><i className="fas fa-calendar-alt text-indigo-500 mr-2"></i>Agenda de Sessões</h3>
                        <span className="bg-indigo-100 text-indigo-800 px-4 py-1.5 rounded-full font-bold text-sm">{consultas.length} Consulta(s) Total</span>
                    </div>

                    {datasOrdenadas.length === 0 ? (
                        <div className="bg-white p-10 text-center rounded-2xl border border-slate-200 text-slate-500">Sem consultas marcadas na agenda.</div>
                    ) : null}

                    {datasOrdenadas.map(dataChave => (
                        <div key={dataChave} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-800 px-5 py-3 text-white font-bold text-sm flex items-center gap-2">
                                <i className="far fa-calendar-day text-indigo-400"></i>
                                Data: {dataChave.split('-').reverse().join('/')}
                            </div>
                            
                            <div className="divide-y divide-slate-100">
                                {agendamentosAgrupados[dataChave].sort((a,b) => a.hora.localeCompare(b.hora)).map(c => {
                                    const proc = PROCEDIMENTOS.find(p => p.id === c.procedimentoId) || PROCEDIMENTOS[0];
                                    return (
                                        <div key={c.id} className="flex flex-col md:flex-row md:items-center justify-between p-5 hover:bg-slate-50 transition-colors gap-4">
                                            
                                            <div className="flex items-center gap-6">
                                                <div className="text-indigo-600 font-black text-2xl w-20 shrink-0 text-center border-r border-slate-200 pr-4">
                                                    {c.hora}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-800 text-lg">{c.paciente}</p>
                                                    <p className="text-sm text-slate-500"><i className="fas fa-phone-alt text-xs mr-1 opacity-70"></i> {c.telefone || 'Sem contacto'}</p>
                                                </div>
                                            </div>

                                            <div className="flex flex-col sm:flex-row sm:items-center gap-4 md:ml-auto">
                                                <span className={`text-xs px-3 py-1.5 rounded-md font-bold border whitespace-nowrap text-center ${proc.corBg} ${proc.corText} ${proc.corBorder}`}>
                                                    {proc.nome}
                                                </span>
                                                <div className="flex gap-2 justify-end">
                                                    <button onClick={() => enviarWhatsApp(c.telefone, c.paciente, c.data, c.hora)} className="text-emerald-600 bg-emerald-50 px-4 py-2 rounded-lg font-bold hover:bg-emerald-100 transition-colors flex items-center gap-2 shadow-sm" title="Enviar Lembrete WhatsApp">
                                                        <i className="fab fa-whatsapp"></i> Lembrete
                                                    </button>
                                                    <button className="text-white bg-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-sm">
                                                        Iniciar
                                                    </button>
                                                </div>
                                            </div>
                                            
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function TabProntuario() {
            const [condicao, setCondicao] = useState('');
            const [exercicios, setExercicios] = useState('');
            const [isGerando, setIsGerando] = useState(false);

            const gerarExerciciosIA = async () => {
                if(!condicao) return;
                setIsGerando(true);
                const prompt = `Gere prescrição de fisioterapia com 3 exercícios simples e seguros para: ${condicao}. Use linguagem simples direcionada ao paciente. Não use negritos Markdown.`;
                const resposta = await generateGeminiContent(prompt, "És um fisioterapeuta experiente e empático. Dá instruções claras e deves incluir número de séries e repetições.");
                setExercicios(resposta);
                setIsGerando(false);
            };

            const partilharExercicios = () => {
                const msg = `Olá! Segue a sua prescrição de exercícios para fazer em casa:\n\n${exercicios}\n\nQualquer dor, suspenda o exercício e contacte-me.`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">Evolução da Sessão (SOAP)</h3>
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Subjetivo (Queixa do Paciente)</label>
                                <textarea className="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm mt-1 outline-none focus:border-indigo-400" rows="2" placeholder="Ex: Paciente refere alívio da dor após a última sessão..."></textarea>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Objetivo (Exame Físico / Conduta)</label>
                                <textarea className="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm mt-1 outline-none focus:border-indigo-400" rows="3" placeholder="Ex: Terapia manual na cervical..."></textarea>
                            </div>
                            <button className="w-full bg-slate-800 text-white font-bold py-2 rounded-lg hover:bg-slate-700">Assinar e Guardar Prontuário</button>
                        </div>
                    </div>

                    <div className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl shadow-sm border border-emerald-100 p-6">
                        <h3 className="font-bold text-emerald-800 mb-2 flex items-center gap-2">✨ IA: Prescrição de Exercícios</h3>
                        <p className="text-xs text-emerald-600 mb-4">Gere exercícios de casa para o paciente usando IA.</p>
                        
                        <input type="text" value={condicao} onChange={e => setCondicao(e.target.value)} placeholder="Ex: Dor lombar crônica" className="w-full border border-emerald-200 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-emerald-400 outline-none" />
                        
                        <button onClick={gerarExerciciosIA} disabled={isGerando || !condicao} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white font-bold py-2 rounded-lg text-sm transition-colors mb-4">
                            {isGerando ? 'A pensar...' : 'Gerar Exercícios'}
                        </button>

                        {exercicios && (
                            <div className="bg-white p-3 rounded-lg border border-emerald-200 text-sm text-slate-700 mb-3 h-40 overflow-y-auto whitespace-pre-wrap">
                                {exercicios}
                            </div>
                        )}

                        {exercicios && (
                            <button onClick={partilharExercicios} className="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-2 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                                <i className="fab fa-whatsapp"></i> Enviar Prescrição via WhatsApp
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function TabFinanceiro({ consultas, usuarios }) {
            const receitaPrevista = consultas.reduce((acc, c) => {
                const proc = PROCEDIMENTOS.find(p => p.id === c.procedimentoId);
                return acc + (proc ? proc.preco : 0); 
            }, 0);

            const pacientesComCarteira = usuarios.filter(u => u.perfil === 'PACIENTE' && u.creditos && Object.keys(u.creditos).length > 0);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                            <p className="text-sm text-slate-500 font-semibold mb-1">Receita Prevista (Mês)</p>
                            <p className="text-3xl font-bold text-slate-800">R$ {receitaPrevista.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-500">
                            <p className="text-sm text-slate-500 font-semibold mb-1">Pacotes Ativos</p>
                            <p className="text-3xl font-bold text-slate-800">{pacientesComCarteira.length} <span className="text-sm font-normal text-slate-400">pacientes</span></p>
                        </div>
                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-amber-500">
                            <p className="text-sm text-slate-500 font-semibold mb-1">Pagamentos Pendentes</p>
                            <p className="text-3xl font-bold text-slate-800">3</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <h3 className="font-bold text-slate-800 mb-4">Controlo de Carteiras Virtuais Ativas</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="text-slate-400 border-b">
                                    <tr>
                                        <th className="pb-2 pr-4">Paciente</th>
                                        <th className="pb-2 pr-4">Procedimento / Plano</th>
                                        <th className="pb-2">Saldo Restante na Carteira</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {pacientesComCarteira.length === 0 ? (
                                        <tr><td colSpan="3" className="py-4 text-center text-slate-500 italic">Sem pacotes ativos no momento.</td></tr>
                                    ) : null}
                                    
                                    {pacientesComCarteira.map(u => {
                                        return Object.keys(u.creditos).map(procId => {
                                            const carteira = u.creditos[procId];
                                            if (carteira.saldo <= 0) return null;
                                            
                                            const proc = PROCEDIMENTOS.find(p => p.id == procId);
                                            return (
                                                <tr key={`${u.email}-${procId}`} className="h-12 hover:bg-slate-50">
                                                    <td className="font-semibold text-slate-800 pr-4">{u.nome}</td>
                                                    <td className="pr-4">
                                                        <span className="block font-medium text-indigo-700">{carteira.plano}</span>
                                                        <span className="text-xs text-slate-500">{proc ? proc.nome : ''}</span>
                                                    </td>
                                                    <td>
                                                        <span className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg text-xs font-black border border-indigo-200">
                                                            {carteira.saldo} Sessão(ões) livre(s)
                                                        </span>
                                                    </td>
                                                </tr>
                                            )
                                        });
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AgendamentoApp />);
    </script>
</body>
</html>
